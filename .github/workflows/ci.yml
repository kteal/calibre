name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  stable:
    name: stable / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      # actions/checkout v6.0.3
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false
      - name: Install stable Rust
        shell: bash
        run: rustup toolchain install stable --profile minimal --component rustfmt,clippy
      - name: Select stable Rust
        shell: bash
        run: rustup default stable
      - name: Check formatting
        if: runner.os == 'Linux'
        run: cargo fmt --check
      - name: Check all targets
        run: cargo check --all-targets --all-features --locked
      - name: Test
        run: cargo test --all-features --locked
      - name: Clippy
        run: >-
          cargo clippy --all-targets --all-features --locked --
          -D warnings
          -W clippy::pedantic
          -W clippy::nursery
      - name: Rustdoc
        shell: bash
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --all-features --no-deps --locked

  msrv:
    name: MSRV 1.85.0
    runs-on: ubuntu-latest
    steps:
      # actions/checkout v6.0.3
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false
      - name: Install MSRV
        run: rustup toolchain install 1.85.0 --profile minimal
      - name: Test MSRV
        run: cargo +1.85.0 test --all-features --locked

  package:
    name: crates.io package
    runs-on: ubuntu-latest
    steps:
      # actions/checkout v6.0.3
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false
      - name: Install stable Rust
        run: rustup toolchain install stable --profile minimal
      - name: Verify package
        run: cargo +stable package --locked
      - name: Verify publish payload
        run: cargo +stable publish --dry-run --locked
