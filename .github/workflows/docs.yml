name: Documentation

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  rustdoc:
    name: Build and deploy Rustdoc
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      # actions/checkout v6.0.3
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false
      - name: Install stable Rust
        run: rustup toolchain install stable --profile minimal
      - name: Build Rustdoc
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo +stable doc --all-features --no-deps --locked
      - name: Add site entry point
        shell: bash
        run: |
          echo '<!doctype html><meta charset="utf-8"><meta http-equiv="refresh" content="0; url=calibre/"><title>calibre documentation</title><a href="calibre/">Open calibre documentation</a>' > target/doc/index.html
          touch target/doc/.nojekyll
      # actions/configure-pages v6.0.0
      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d
      # actions/upload-pages-artifact v5.0.0
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9
        with:
          path: target/doc
      # actions/deploy-pages v5.0.0
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128
